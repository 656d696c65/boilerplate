# ==============================================================================
# boilerplate Platform - Production Environment
# ==============================================================================
# Docker Compose configuration for production deployment
#
# Architecture:
# - API: Node.js with compiled TypeScript
# - Dashboard: Static build served by Nginx
# - Worker: Python audio processing service
# - Infrastructure: External (managed PostgreSQL, S3)
#
# Usage:
#   docker compose -f .workflows/build/compose.yml up -d
#   docker compose -f .workflows/build/compose.yml down
#
# The VERSION is read from the root VERSION file. Override with:
#   VERSION=1.2.3 docker compose -f .workflows/build/compose.yml build
#
# Required environment variables:
#   VERSION      - Semver tag for all images (default: latest)
#   VITE_API_BASE_URL   - Public URL of the API (baked into dashboard JS bundle)
# ==============================================================================

services:
  # API - Backend service
  boilerplate-api:
    image: boilerplate-api:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: ./.workflows/build/api/Dockerfile
      args:
        VERSION: ${VERSION:-latest}
    volumes:
      - ./packages/api/.env:/root/packages/api/.env:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Website - Frontend (static build served by Nginx)
  boilerplate-website:
    image: boilerplate-website:${VERSION:-latest}
    build:
      context: ../.. 
      dockerfile: ./.workflows/build/website/Dockerfile
      args:
        VERSION: ${VERSION:-latest}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL must be set}
        VITE_WEBSITE_BASE_URL: ${VITE_WEBSITE_BASE_URL:?VITE_WEBSITE_BASE_URL must be set}
    ports:
      - "3001:80"
    restart: unless-stopped

  # Worker - Background job processor
  boilerplate-worker:
    image: boilerplate-worker:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: ./.workflows/build/worker/Dockerfile
      args:
        VERSION: ${VERSION:-latest}
    restart: unless-stopped
